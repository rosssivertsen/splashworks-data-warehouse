name: splashworks_warehouse
version: '1.0.0'
config-version: 2

profile: splashworks

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

models:
  splashworks_warehouse:
    staging:
      +materialized: view
      +schema: staging
    warehouse:
      +materialized: table
      +schema: warehouse
    semantic:
      +materialized: table
      +schema: semantic
