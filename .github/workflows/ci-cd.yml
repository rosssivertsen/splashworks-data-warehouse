name: Pool Service BI Dashboard - CI/CD

on:
  push:
    branches: [ main, staging, development ]
  pull_request:
    branches: [ main, staging, development ]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: TypeScript compilation check
      run: npm run build
      
    - name: ESLint check
      run: npm run lint
      
    - name: Format check
      run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}"

  testing:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run unit tests
      run: npm test -- --coverage --watchAll=false
      
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: success()

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security audit
      run: npm audit --audit-level moderate
      
    - name: Check for vulnerabilities
      run: npx audit-ci --moderate

  build-test:
    name: Build and Test Deploy
    runs-on: ubuntu-latest
    needs: [code-quality, testing]
    
    strategy:
      matrix:
        node-version: [18, 20]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Test build artifacts
      run: |
        ls -la dist/
        test -f dist/index.html
        test -f dist/assets/*.js
        test -f dist/assets/*.css

  deployment-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [code-quality, testing, security-scan, build-test]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build for staging
      run: npm run build
      env:
        NODE_ENV: staging
        
    - name: Deploy to staging environment
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # Example: rsync, S3 upload, or deployment service API calls
        
    - name: Run smoke tests
      run: |
        echo "Running staging smoke tests..."
        # Add smoke test commands here

  deployment-production:
    name: Deploy to Production  
    runs-on: ubuntu-latest
    needs: [code-quality, testing, security-scan, build-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build for production
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        
    - name: Create release tag
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        VERSION=$(date +%Y.%m.%d.%H%M)
        git tag -a "v$VERSION" -m "Release v$VERSION - Pool Service BI Dashboard"
        git push origin "v$VERSION"

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deployment-staging, deployment-production]
    if: always()
    
    steps:
    - name: Notify deployment status
      run: |
        if [ "${{ needs.deployment-staging.result }}" == "success" ]; then
          echo "✅ Staging deployment successful"
        fi
        if [ "${{ needs.deployment-production.result }}" == "success" ]; then
          echo "✅ Production deployment successful"
        fi
        if [ "${{ needs.deployment-staging.result }}" == "failure" ] || [ "${{ needs.deployment-production.result }}" == "failure" ]; then
          echo "❌ Deployment failed - check logs"
          exit 1
        fi