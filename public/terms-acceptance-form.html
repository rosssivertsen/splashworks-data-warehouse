<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terms Acceptance Form (Hidden)</title>
</head>
<body>
  <!-- This file is used by Netlify to detect the form structure. It is not displayed to users. -->
  <form name="terms-acceptance" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="terms-acceptance" />
    <input type="hidden" name="bot-field" />
    <input type="text" name="name" />
    <input type="date" name="date" />
    <input type="hidden" name="timestamp" />
    <input type="checkbox" name="agreed" />
  </form>
</body>
</html>
