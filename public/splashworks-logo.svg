<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue gradient for water -->
    <radialGradient id="waterGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </radialGradient>
    <!-- Yellow gradient for sun -->
    <radialGradient id="sunGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FDE047"/>
      <stop offset="100%" style="stop-color:#EAB308"/>
    </radialGradient>
  </defs>
  
  <!-- Water circle background -->
  <circle cx="20" cy="25" r="18" fill="url(#waterGradient)"/>
  
  <!-- Water wave lines -->
  <path d="M6 30 Q13 27 20 30 Q27 33 34 30" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M8 35 Q15 32 20 35 Q25 38 32 35" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Sun element -->
  <circle cx="28" cy="15" r="8" fill="url(#sunGradient)"/>
  
  <!-- Sun rays -->
  <g stroke="#EAB308" stroke-width="1.5" stroke-linecap="round">
    <line x1="28" y1="3" x2="28" y2="6"/>
    <line x1="36" y1="7" x2="34" y2="9"/>
    <line x1="39" y1="15" x2="36" y2="15"/>
    <line x1="36" y1="23" x2="34" y2="21"/>
    <line x1="28" y1="27" x2="28" y2="24"/>
    <line x1="20" y1="23" x2="22" y2="21"/>
    <line x1="17" y1="15" x2="20" y2="15"/>
    <line x1="20" y1="7" x2="22" y2="9"/>
  </g>
  
  <!-- Splashworks text -->
  <text x="45" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E3A8A">Splash</text>
  <text x="95" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0EA5E9">works</text>
  
  <!-- Tagline -->
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="7" font-weight="normal" fill="#64748B" letter-spacing="0.5px">POOL MAINTENANCE SIMPLIFIED</text>
</svg>