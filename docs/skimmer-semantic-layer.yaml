# Splashworks Pool Service — Semantic Layer
# Target: PostgreSQL warehouse (dbt-managed schemas)
# Last updated: 2026-03-10

warehouse_schema:
  staging: public_staging
  warehouse: public_warehouse
  semantic: public_semantic

data_freshness:
  description: "Nightly extract from Skimmer, trailing ~6 months. Data is overwritten each night."
  note: "When users ask about a month like 'December' or 'January' without specifying a year, use the most recent occurrence within the data window. Check dim_date or query MAX(service_date) if unsure."
  approximate_window: "trailing 6 months from current date"

business_terms:
  active_customer:
    description: "Customer currently receiving pool service (is_inactive = 0 in dim_customer)"
    sql_pattern: "WHERE is_inactive = 0"
    tables: [dim_customer]
    skimmer_doc: "https://help.getskimmer.com/article/56-add-edit-or-delete-a-body-of-water-web"

  cancelled_customer:
    description: "Customer who stopped service. Skimmer has no 'cancelled' field — use IsInactive=1 (deactivated) or Deleted=1 (removed). Use UpdatedAt as the cancellation date. When asked 'cancelled last month', filter on updated_at within that month AND (is_inactive=1 OR deleted=1)."
    sql_pattern: |
      SELECT customer_id, _company_name, clean_customer_name, updated_at AS cancelled_date
      FROM public_staging.stg_customer
      WHERE (is_inactive = 1 OR deleted = 1)
        AND updated_at >= '<start_date>' AND updated_at < '<end_date>'
    tables: [stg_customer, dim_customer]
    synonyms: ["cancelled", "lost customer", "churned", "deactivated", "inactive customer", "customer attrition"]
    note: "Nightly extract only covers ~6 months trailing. Cancellations older than that may be missing. Count of 'cancelled last year' may undercount if data window doesn't go back far enough."

  new_customer:
    description: "Customer added in a given period. Use CreatedAt as the signup date."
    sql_pattern: |
      SELECT customer_id, _company_name, clean_customer_name, created_at
      FROM public_staging.stg_customer
      WHERE created_at >= '<start_date>' AND created_at < '<end_date>'
        AND is_inactive = 0
    tables: [stg_customer]
    synonyms: ["new customer", "customer added", "signed up", "onboarded"]

  rate_type:
    description: "How a customer is billed. Values: FlatMonthlyRateIncludingChemicals, FlatMonthlyRatePlusChemicals, PerStopIncludingChemicals, PerStopPlusChemicals, None"
    sql_pattern: "dim_service_location.rate_type"
    tables: [dim_service_location]
    skimmer_doc: "https://help.getskimmer.com/article/199-how-to-charge-for-chemical-dosages"

  profit:
    description: "Service Rate minus Labor Cost minus Dosage Cost. Matches Skimmer's Profit Report."
    sql_pattern: "semantic_profit.profit = service_rate - total_cost"
    tables: [semantic_profit]
    skimmer_doc: "https://help.getskimmer.com/article/299-profit-report"

  service_stop:
    description: "A single visit to a pool by a technician. Grain of operational reporting. One row per route_stop (visit)."
    sql_pattern: "SELECT * FROM public_warehouse.fact_service_stop"
    tables: [fact_service_stop]
    skimmer_doc: "https://help.getskimmer.com/article/80-view-customer-service-history-web"

  minutes_at_stop:
    description: "Duration of a service visit in minutes (typical range 15-90, average ~27 min)"
    sql_pattern: "fact_service_stop.minutes_at_stop"
    tables: [fact_service_stop]
    skimmer_doc: "https://help.getskimmer.com/article/119-how-time-tracking-works-app"

  service_status:
    description: "Whether a service visit was completed (1) or skipped/incomplete (0). Derived from Skimmer's sentinel timestamp."
    sql_pattern: "fact_service_stop.service_status = 1 for completed, = 0 for skipped"
    tables: [fact_service_stop]
    synonyms: ["completed", "skipped", "visit status"]

  skipped_stop:
    description: "Route stop not completed. Tracked with optional reasons and email alerts. Filter: service_status = 0"
    sql_pattern: "WHERE fact_service_stop.service_status = 0"
    tables: [fact_service_stop]
    skimmer_doc: "https://help.getskimmer.com/article/160-skipped-stops-skip-tracking-reasons-and-email-alerts"

  payment_method:
    description: "How a customer paid. Values: Card, Check, Credit, Other, Bank, Cash"
    sql_pattern: "fact_payment.payment_method"
    tables: [fact_payment]
    skimmer_doc: "https://help.getskimmer.com/article/151-skimmer-billing-how-to-manage-payments"

  ar_aging:
    description: "Accounts receivable aging: Current, 30-day, 60-day, 90-day+ overdue buckets. Derive from invoice due_date vs current_date."
    sql_pattern: "Use fact_invoice.due_date and payment_status to calculate aging buckets"
    tables: [fact_invoice, fact_payment]
    skimmer_doc: "https://help.getskimmer.com/article/157-skimmer-billing-report-ar-aging-summary"

  pool:
    description: "Body of water at a service location. Has gallons, filter baseline PSI, name (Pool/Spa/Fountain/etc.)"
    sql_pattern: "SELECT * FROM public_warehouse.dim_pool"
    tables: [dim_pool]
    skimmer_doc: "https://help.getskimmer.com/article/56-add-edit-or-delete-a-body-of-water-web"

  labor_cost_type:
    description: "How tech labor is costed. Values: PerStop, PerMonth, None"
    sql_pattern: "dim_service_location.labor_cost_type"
    tables: [dim_service_location]
    skimmer_doc: "https://help.getskimmer.com/article/302-labor-report"

  can_include_with_service:
    description: "Boolean flag on chemicals — determines if dosage cost is bundled with service or separately charged"
    sql_pattern: "dim_chemical.can_include_with_service"
    tables: [dim_chemical]
    skimmer_doc: "https://help.getskimmer.com/article/199-how-to-charge-for-chemical-dosages"

  chemical_dosage:
    description: "Chemical administered during service with volume, cost, price, and profit"
    sql_pattern: "SELECT * FROM public_warehouse.fact_dosage"
    tables: [fact_dosage]
    skimmer_doc: "https://help.getskimmer.com/article/300-chemical-dosages-report"

  chlorine_usage:
    description: "Total amount of chlorine chemicals added to pools"
    sql_pattern: "WHERE fact_dosage.entry_description LIKE '%Chlorine%'"
    tables: [fact_dosage]
    synonyms: ["chlorine dosage", "chlorine added", "chlorine chemicals"]

  active_route:
    description: "A current route assignment for a technician at a service location. Uses RouteAssignment table (staging). Active means EndDate >= today (Skimmer uses 2080-01-01 as 'no end' sentinel). Groups by service location, NOT individual bodies of water (Pool + Spa at same address = 1 route stop)."
    sql_pattern: |
      SELECT a.full_name AS technician, ra.day_of_week, c.clean_customer_name, sl.address, sl.city, sl.state, sl.zip, ra.frequency, MAX(p.gallons) AS pool_size
      FROM public_staging.stg_route_assignment ra
      JOIN public_staging.stg_account a ON ra.account_id = a.account_id AND ra._company_name = a._company_name
      JOIN public_staging.stg_service_location sl ON ra.service_location_id = sl.service_location_id AND ra._company_name = sl._company_name
      JOIN public_warehouse.dim_customer c ON sl.customer_id = c.customer_id AND sl._company_name = c._company_name
      LEFT JOIN public_warehouse.dim_pool p ON sl.service_location_id = p.service_location_id AND sl._company_name = p._company_name
      WHERE ra.end_date >= CURRENT_DATE::text AND c.is_inactive = 0
      GROUP BY ra.route_assignment_id, a.full_name, ra.day_of_week, c.clean_customer_name, sl.address, sl.city, sl.state, sl.zip, ra.frequency
    tables: [stg_route_assignment, stg_account, stg_service_location, dim_customer, dim_pool]
    synonyms: ["route", "route assignment", "route list", "tech schedule", "service schedule", "active routes"]
    note: "RouteAssignment.DayOfWeek is a text string (Monday, Tuesday, etc.), not a number. Frequency values: Weekly, Every 2 Weeks. EndDate of 2080-01-01 means 'no end date' (still active)."

  installed_item:
    description: "Parts/chemicals marked installed during service. NOT YET IN WAREHOUSE — raw data only."
    tables: []
    skimmer_doc: "https://help.getskimmer.com/article/301-installed-items-report"
    data_availability: "not_available"

  equipment:
    description: "Pool equipment (pumps, filters, salt systems) tracked by Category/Make/Model. NOT YET IN WAREHOUSE."
    tables: []
    skimmer_doc: "https://help.getskimmer.com/article/59-add-and-delete-equipment-web"
    data_availability: "not_available"

tables:
  dim_customer:
    schema: public_warehouse
    description: "Customer dimension — one row per customer per company"
    key_columns: [customer_id, _company_name, clean_customer_name, is_inactive, billing_city, billing_state]
    primary_key: customer_id
    active_filter: "is_inactive = 0"

  dim_service_location:
    schema: public_warehouse
    description: "Service location dimension — customer addresses with rate and labor cost configuration"
    key_columns: [service_location_id, customer_id, _company_name, city, state, zip, rate, rate_type, labor_cost, labor_cost_type]
    primary_key: service_location_id
    joins_to: dim_customer via customer_id

  dim_pool:
    schema: public_warehouse
    description: "Pool/body of water dimension — gallons, type, filter baseline pressure"
    key_columns: [pool_id, service_location_id, customer_id, _company_name, pool_name, gallons, baseline_filter_pressure]
    primary_key: pool_id
    joins_to: dim_service_location via service_location_id, dim_customer via customer_id

  dim_tech:
    schema: public_warehouse
    description: "Technician/account dimension — staff who service pools"
    key_columns: [tech_id, _company_name, full_name, role_type, is_active]
    primary_key: tech_id

  dim_chemical:
    schema: public_warehouse
    description: "Chemical/entry description dimension — readings and dosage types"
    key_columns: [chemical_id, _company_name, description, entry_type, unit_of_measure, dosage_type, cost, price]
    primary_key: chemical_id

  dim_date:
    schema: public_warehouse
    description: "Date dimension — 2024-2027 date spine with day/week/month/quarter/year/season"
    key_columns: [date_key, day_of_week, month_num, month_name, quarter, year, year_month, season]
    primary_key: date_key

  fact_dosage:
    schema: public_warehouse
    description: "Chemical dosage events per service stop — volume, cost, price"
    key_columns: [service_stop_id, route_stop_id, service_date, service_month, tech_id, customer_id, entry_description, dosage_cost, dosage_price]
    grain: "one row per dosage entry per service stop"

  fact_labor:
    schema: public_warehouse
    description: "Labor facts — time and cost per route stop"
    key_columns: [service_stop_id, route_stop_id, service_date, service_month, tech_id, customer_id, minutes_at_stop, service_status, rate, labor_cost]
    grain: "one row per service stop"

  fact_invoice:
    schema: public_warehouse
    description: "Invoice facts with customer, location, and line item detail"
    key_columns: [invoice_id, customer_id, _company_name, invoice_date, invoice_status, payment_status, line_total, product_name]
    grain: "one row per invoice line item"

  fact_service_stop:
    schema: public_warehouse
    description: "Core operational grain — one row per visit per pool. Answers duration, frequency, and completion questions."
    key_columns: [route_stop_id, service_stop_id, service_location_id, customer_id, pool_id, tech_id, service_date, minutes_at_stop, service_status, notes]
    grain: "one row per route stop (visit)"
    note: "LEFT JOIN to stg_service_stop — skipped stops have no service_stop record but still appear as rows"

  fact_payment:
    schema: public_warehouse
    description: "Payment records — amount, date, method per invoice"
    key_columns: [payment_id, invoice_id, customer_id, _company_name, amount, payment_date, payment_method]
    grain: "one row per payment"

  fact_work_order:
    schema: public_warehouse
    description: "Work order facts — ad hoc maintenance tasks"
    key_columns: [work_order_id, service_location_id, tech_id, service_date, service_status, labor_cost, price]
    grain: "one row per work order"

  semantic_profit:
    schema: public_semantic
    description: "Per-customer, per-month profitability. Matches Skimmer's Profit Report: profit = service_rate - labor_cost - dosage_cost"
    key_columns: [customer_id, _company_name, customer_name, service_month, rate_type, service_rate, labor_cost, dosage_cost, total_cost, profit, stop_count]
    grain: "one row per customer per month"

  rpt_customer_360:
    schema: public_semantic
    description: "Denormalized customer profile — one row per customer with service stats, financials, profitability, and lifetime value. Use for 'tell me about customer X' questions."
    key_columns: [customer_id, _company_name, clean_customer_name, is_inactive, deleted, location_count, pool_count, total_stops, completed_stops, total_invoiced, total_payments, total_profit, lifetime_value, avg_monthly_value, tenure_months]
    grain: "one row per customer per company"
    note: "Includes ALL customers (active + inactive). Filter is_inactive = 0 AND deleted = 0 for active only."

  rpt_service_history:
    schema: public_semantic
    description: "Denormalized service visit history — one row per stop with customer name, technician name, pool name, and service address. Use for service history, skipped stops, technician activity, and visit duration questions."
    key_columns: [_company_name, service_date, service_month, customer_name, technician_name, pool_name, pool_gallons, service_address, service_city, service_state, service_zip, service_status, start_time, complete_time, minutes_at_stop, notes, notes_to_customer]
    grain: "one row per service stop (visit)"
    note: "service_status: 1 = completed, 0 = skipped. service_date is TEXT (YYYY-MM-DD). No IDs — all names are denormalized."

  rpt_payment_summary:
    schema: public_semantic
    description: "Denormalized payment history — one row per payment with customer name, payment method, and linked invoice details. Use for payment history, collections, and revenue questions."
    key_columns: [_company_name, payment_date, payment_month, customer_name, billing_city, billing_state, amount, payment_method, invoice_number, invoice_date, invoice_status, payment_status, invoice_total]
    grain: "one row per payment"
    note: "payment_date is TEXT (YYYY-MM-DD). No IDs — all names are denormalized. payment_method values vary (Check, Credit Card, Cash, etc.)."

relationships:
  customer_to_location:
    description: "Customer to service locations (1:many)"
    join: "dim_customer.customer_id = dim_service_location.customer_id AND dim_customer._company_name = dim_service_location._company_name"

  location_to_pool:
    description: "Service location to pools/bodies of water (1:many)"
    join: "dim_service_location.service_location_id = dim_pool.service_location_id"

  customer_to_pool:
    description: "Customer to pools (through service location)"
    join: "dim_customer.customer_id = dim_pool.customer_id AND dim_customer._company_name = dim_pool._company_name"

  customer_to_service_stop:
    description: "Customer to service visits (1:many)"
    join: "dim_customer.customer_id = fact_service_stop.customer_id AND dim_customer._company_name = fact_service_stop._company_name"

  customer_to_dosage:
    description: "Customer to chemical dosages"
    join: "dim_customer.customer_id = fact_dosage.customer_id AND dim_customer._company_name = fact_dosage._company_name"

  customer_to_invoice:
    description: "Customer to invoices"
    join: "dim_customer.customer_id = fact_invoice.customer_id AND dim_customer._company_name = fact_invoice._company_name"

  customer_to_payment:
    description: "Customer to payments (through invoice)"
    join: "dim_customer.customer_id = fact_payment.customer_id AND dim_customer._company_name = fact_payment._company_name"

  customer_to_profit:
    description: "Customer to profitability summary"
    join: "dim_customer.customer_id = semantic_profit.customer_id AND dim_customer._company_name = semantic_profit._company_name"

  tech_to_service_stop:
    description: "Technician to service visits"
    join: "dim_tech.tech_id = fact_service_stop.tech_id AND dim_tech._company_name = fact_service_stop._company_name"

metrics:
  profit:
    description: "Per-customer monthly profit"
    formula: "service_rate - (labor_cost + dosage_cost)"
    table: semantic_profit
    skimmer_doc: "https://help.getskimmer.com/article/299-profit-report"

  avg_minutes_at_stop:
    description: "Average service visit duration in minutes"
    formula: "AVG(fact_service_stop.minutes_at_stop) WHERE service_status = 1"
    table: fact_service_stop

  completion_rate:
    description: "Percentage of scheduled stops that were completed"
    formula: "SUM(service_status) / COUNT(*) * 100"
    table: fact_service_stop

  skipped_stop_count:
    description: "Number of stops not completed"
    formula: "COUNT(*) WHERE service_status = 0"
    table: fact_service_stop

verified_queries:
  - question: "How many active customers does each company have?"
    sql: |
      SELECT _company_name, COUNT(*) AS active_customers
      FROM public_warehouse.dim_customer
      WHERE is_inactive = 0 AND deleted = 0
      GROUP BY _company_name
      ORDER BY _company_name
    expected: "AQPS: ~859, JOMO: ~2403"

  - question: "What is the average pool size in gallons by company?"
    sql: |
      SELECT p._company_name, AVG(p.gallons) AS avg_gallons, COUNT(*) AS pool_count
      FROM public_warehouse.dim_pool p
      JOIN public_warehouse.dim_customer c
        ON p.customer_id = c.customer_id AND p._company_name = c._company_name
      WHERE c.is_inactive = 0 AND p.gallons IS NOT NULL
      GROUP BY p._company_name
    expected: "Pool gallons averages by company"

  - question: "Show me customers with pools larger than 10000 gallons"
    sql: |
      SELECT c.clean_customer_name, c._company_name, p.pool_name, p.gallons
      FROM public_warehouse.dim_pool p
      JOIN public_warehouse.dim_customer c
        ON p.customer_id = c.customer_id AND p._company_name = c._company_name
      WHERE p.gallons > 10000 AND c.is_inactive = 0
      ORDER BY p.gallons DESC
    expected: "Customers with large pools"

  - question: "What is the average time spent at a stop in January?"
    sql: |
      SELECT _company_name, AVG(minutes_at_stop) AS avg_minutes, COUNT(*) AS stop_count
      FROM public_warehouse.fact_service_stop
      WHERE service_status = 1
        AND service_date >= '2026-01-01' AND service_date < '2026-02-01'
      GROUP BY _company_name
    expected: "Average ~27 minutes per stop"

  - question: "How many skipped stops were there last month?"
    sql: |
      SELECT _company_name, COUNT(*) AS skipped_count
      FROM public_warehouse.fact_service_stop
      WHERE service_status = 0
        AND service_date >= '2026-02-01' AND service_date < '2026-03-01'
      GROUP BY _company_name
    expected: "Count of skipped stops by company"

  - question: "Show payments received this month by method"
    sql: |
      SELECT _company_name, payment_method, COUNT(*) AS payment_count, SUM(amount) AS total_amount
      FROM public_warehouse.fact_payment
      WHERE payment_date >= '2026-03-01' AND payment_date < '2026-04-01'
      GROUP BY _company_name, payment_method
      ORDER BY total_amount DESC
    expected: "Card is most common, then Check"

  - question: "Which customers are most profitable?"
    sql: |
      SELECT customer_name, _company_name, service_month, service_rate, total_cost, profit
      FROM public_semantic.semantic_profit
      ORDER BY profit DESC
      LIMIT 20
    expected: "Top 20 most profitable customers"

  - question: "List active routes for JOMO with technician, service day, address, and pool size"
    sql: |
      SELECT
        a.full_name AS technician,
        ra.day_of_week AS service_day,
        c.clean_customer_name AS customer,
        sl.address || ', ' || sl.city || ', ' || sl.state || ' ' || sl.zip AS service_address,
        ra.frequency,
        MAX(p.gallons) AS pool_size
      FROM public_staging.stg_route_assignment ra
      JOIN public_staging.stg_account a ON ra.account_id = a.account_id AND ra._company_name = a._company_name
      JOIN public_staging.stg_service_location sl ON ra.service_location_id = sl.service_location_id AND ra._company_name = sl._company_name
      JOIN public_warehouse.dim_customer c ON sl.customer_id = c.customer_id AND sl._company_name = c._company_name
      LEFT JOIN public_warehouse.dim_pool p ON sl.service_location_id = p.service_location_id AND sl._company_name = p._company_name
      WHERE ra.end_date >= CURRENT_DATE::text
        AND c.is_inactive = 0
        AND ra._company_name = 'JOMO'
        AND a.full_name NOT LIKE '%Unscheduled%'
      GROUP BY ra.route_assignment_id, a.full_name, ra.day_of_week, c.clean_customer_name,
        sl.address, sl.city, sl.state, sl.zip, ra.frequency, ra.sequence
      ORDER BY a.full_name,
        CASE ra.day_of_week WHEN 'Monday' THEN 1 WHEN 'Tuesday' THEN 2 WHEN 'Wednesday' THEN 3
          WHEN 'Thursday' THEN 4 WHEN 'Friday' THEN 5 WHEN 'Saturday' THEN 6 WHEN 'Sunday' THEN 7 END,
        ra.sequence
    expected: "~2100+ active route assignments for JOMO, grouped by tech and day"

  - question: "What are the most common chemical readings?"
    sql: |
      SELECT entry_description, COUNT(*) AS reading_count
      FROM public_warehouse.fact_dosage
      GROUP BY entry_description
      ORDER BY reading_count DESC
      LIMIT 10
    expected: "Chemical types ranked by frequency — do NOT filter by entry_type"

  - question: "How many cancelled customers did we have last month and last year?"
    sql: |
      SELECT
        _company_name,
        SUM(CASE WHEN updated_at >= '2026-02-01' AND updated_at < '2026-03-01' THEN 1 ELSE 0 END) AS cancelled_last_month,
        SUM(CASE WHEN updated_at >= '2025-01-01' AND updated_at < '2026-01-01' THEN 1 ELSE 0 END) AS cancelled_last_year
      FROM public_warehouse.dim_customer
      WHERE (is_inactive = 1 OR deleted = 1)
      GROUP BY _company_name
      ORDER BY _company_name
    expected: "Use (is_inactive = 1 OR deleted = 1) for cancelled. updated_at is cancellation date."

  - question: "How many new customers signed up this month?"
    sql: |
      SELECT _company_name, COUNT(*) AS new_customers
      FROM public_warehouse.dim_customer
      WHERE created_at >= '2026-03-01' AND created_at < '2026-04-01'
        AND is_inactive = 0 AND deleted = 0
      GROUP BY _company_name
      ORDER BY _company_name
    expected: "New signups for current month"

  - question: "Show all skipped stops for February"
    sql: |
      SELECT _company_name, technician_name, customer_name,
             service_address || ', ' || service_city AS address,
             service_date
      FROM public_semantic.rpt_service_history
      WHERE service_status = 0
        AND service_date >= '2026-02-01' AND service_date < '2026-03-01'
      ORDER BY _company_name, service_date
    expected: "Skipped stops with tech, customer, address. service_status=0 means skipped. Uses rpt_service_history — no joins needed."

  - question: "Tell me everything about customer [name]"
    sql: |
      SELECT clean_customer_name, _company_name, billing_city, billing_state,
             is_inactive, deleted, created_at, updated_at,
             location_count, pool_count, total_stops, completed_stops,
             first_service_date, last_service_date, avg_minutes_per_stop,
             total_invoiced, invoice_count, total_payments, payment_count, last_payment_date,
             total_revenue, total_cost, total_profit, avg_monthly_profit,
             tenure_months, lifetime_value, avg_monthly_value
      FROM public_semantic.rpt_customer_360
      WHERE clean_customer_name ILIKE '%[name]%'
        AND is_inactive = 0 AND deleted = 0
    notes: "Replace [name] with the customer name. ILIKE for case-insensitive partial match."

  - question: "Show service history for customer [name]"
    sql: |
      SELECT service_date, customer_name, technician_name, pool_name,
             service_address, service_city, service_status,
             minutes_at_stop, notes_to_customer
      FROM public_semantic.rpt_service_history
      WHERE customer_name ILIKE '%[name]%'
      ORDER BY service_date DESC
    notes: "Use rpt_service_history for all service visit queries — no joins needed. Replace [name] with customer name."

  - question: "Which technician serviced the most stops last month?"
    sql: |
      SELECT technician_name, _company_name,
             COUNT(*) AS total_stops,
             COUNT(CASE WHEN service_status = 1 THEN 1 END) AS completed,
             ROUND(AVG(CASE WHEN service_status = 1 THEN minutes_at_stop END)::numeric, 1) AS avg_minutes
      FROM public_semantic.rpt_service_history
      WHERE service_date >= '2026-02-01' AND service_date < '2026-03-01'
      GROUP BY technician_name, _company_name
      ORDER BY total_stops DESC
    notes: "Adjust date range to match 'last month'. Uses rpt_service_history — no joins needed."

  - question: "Show total payments received by month"
    sql: |
      SELECT payment_month, _company_name,
             COUNT(*) AS payment_count,
             ROUND(SUM(amount)::numeric, 2) AS total_collected
      FROM public_semantic.rpt_payment_summary
      GROUP BY payment_month, _company_name
      ORDER BY payment_month DESC
    notes: "Uses rpt_payment_summary — no joins needed. Adjust GROUP BY for different aggregations."

  - question: "Which customers have outstanding payments?"
    sql: |
      SELECT customer_name, _company_name, invoice_number,
             invoice_date, invoice_total, payment_status
      FROM public_semantic.rpt_payment_summary
      WHERE payment_status != 'Paid'
      ORDER BY invoice_date
    notes: "Uses rpt_payment_summary. payment_status values: Paid, Unpaid, Partial, etc."

data_gaps:
  - name: "Equipment/Parts"
    description: "5 raw tables (Equipment, EquipmentItem, etc.) not yet staged or modeled"
    impact: "Cannot answer questions about pool equipment lifecycle"

  - name: "Installed Items"
    description: "Parts/chemicals marked installed during service not in warehouse"
    impact: "Cannot generate Installed Items Report equivalent"
    skimmer_doc: "https://help.getskimmer.com/article/301-installed-items-report"

  - name: "Route Optimization"
    description: "RouteMove, RouteSkip tables exist but not modeled beyond staging"
    impact: "Cannot analyze route efficiency or skip reasons beyond basic assignment data"

  - name: "Product Categories"
    description: "Product table staged but not dimensionalized with categories"
    impact: "Limited product-level reporting"

  - name: "LSI Calculation"
    description: "Langelier Saturation Index formula documented but not operationalized as a model"
    impact: "Cannot calculate water balance index from readings"

industry_metrics:
  route_production_per_tech:
    description: "Recurring service revenue per technician per period (excludes work orders)"
    calculation: "SUM(dim_service_location.rate) grouped by technician via stg_route_assignment"
    tables: [dim_service_location, stg_route_assignment, stg_account]
    synonyms: ["route production", "tech revenue", "revenue per tech", "production per route", "route revenue"]
    confidence: high

  jobs_completed_per_day:
    description: "Average number of completed stops per technician per workday"
    calculation: "COUNT(*) FROM fact_service_stop WHERE service_status=1, GROUP BY tech_id, service_date"
    tables: [fact_service_stop, dim_tech]
    synonyms: ["stops per day", "jobs per day", "daily completions", "completions per tech"]
    confidence: high

  revenue_per_technician:
    description: "Total service revenue divided by number of technicians over a period"
    calculation: "SUM(dim_service_location.rate) / COUNT(DISTINCT tech_id) via route assignments"
    tables: [dim_service_location, stg_route_assignment, stg_account]
    synonyms: ["revenue per tech", "avg tech revenue", "technician revenue"]
    confidence: high

  mean_time_per_stop:
    description: "Average duration of a completed service visit in minutes"
    calculation: "AVG(fact_service_stop.minutes_at_stop) WHERE service_status = 1"
    tables: [fact_service_stop]
    synonyms: ["average stop time", "time per visit", "minutes per stop", "service duration"]
    confidence: high

  jobs_per_route_per_period:
    description: "Total completed stops on a route in a time period, grouped by tech"
    calculation: "COUNT(*) FROM fact_service_stop WHERE service_status=1, GROUP BY tech_id and period"
    tables: [fact_service_stop, dim_tech]
    synonyms: ["stops per route", "route volume", "jobs per route"]
    confidence: high

  service_completion_rate:
    description: "Percentage of scheduled stops that were completed"
    calculation: "SUM(service_status) / COUNT(*) * 100 FROM fact_service_stop"
    tables: [fact_service_stop]
    synonyms: ["completion rate", "stop completion", "visit completion rate"]
    confidence: high

  skipped_stop_rate:
    description: "Percentage and count of stops not completed, with skip reasons"
    calculation: "COUNT(*) WHERE service_status=0, with skip_reason from fact_service_stop"
    tables: [fact_service_stop]
    synonyms: ["skip rate", "skipped stops", "missed stops", "incomplete stops"]
    confidence: high

  average_ticket_value:
    description: "Average revenue per invoice"
    calculation: "AVG(fact_invoice.subtotal)"
    tables: [fact_invoice]
    synonyms: ["average ticket", "avg invoice", "revenue per visit", "average treatment value", "avg ticket"]
    confidence: high

  collection_rate:
    description: "Percentage of invoiced revenue actually collected"
    calculation: "SUM(fact_payment.amount) / SUM(fact_invoice.subtotal) * 100"
    tables: [fact_payment, fact_invoice]
    synonyms: ["collection rate", "payment rate", "collections percentage", "percent collected"]
    confidence: high

  days_sales_outstanding:
    description: "Average days from invoice to payment received"
    calculation: "AVG(fact_payment.payment_date::date - fact_invoice.invoice_date::date) — requires matching payments to invoices by customer"
    tables: [fact_payment, fact_invoice]
    synonyms: ["DSO", "days to collect", "days outstanding", "days to pay"]
    confidence: medium

  work_order_completion_rate:
    description: "Percentage of assigned work orders completed"
    calculation: "SUM(CASE WHEN service_status=1 THEN 1 ELSE 0 END) / COUNT(*) * 100 FROM fact_work_order"
    tables: [fact_work_order]
    synonyms: ["work order completion", "WO completion rate"]
    confidence: high

  customer_churn:
    description: "Customers who stopped service in a period"
    calculation: "COUNT(*) FROM dim_customer WHERE (is_inactive=1 OR deleted=1) AND updated_at within period"
    tables: [dim_customer]
    synonyms: ["churn", "cancellations", "lost customers", "attrition", "cancelled customers", "customer losses"]
    confidence: high

  # --- Unanswerable metrics (blocked on future data sources) ---

  technician_utilization:
    description: "Percent of paid hours spent on billable work (on-site service) vs drive/admin time"
    calculation: null
    tables: []
    synonyms: ["utilization rate", "tech utilization", "billable hours", "utilization"]
    confidence: unanswerable
    data_gap: "No clock-in/clock-out data in Skimmer. Only minutes_at_stop (time on-site) is available."
    blocked_on: "Time & attendance integration (Homebase, Deputy, etc.)"
    partial_answer: "I can show average minutes per stop by technician, which gives a partial picture of on-site time."

  first_time_fix_rate:
    description: "Percent of jobs resolved without a callback or return visit"
    calculation: null
    tables: []
    synonyms: ["first visit fix", "callback rate", "repeat visit rate", "first-time resolution"]
    confidence: unanswerable
    data_gap: "Skimmer does not track callbacks or return visits."
    blocked_on: "CRM or dispatch system with callback tracking"
    partial_answer: "I can show skipped stops and work orders, which may indicate follow-up needs."

  drive_time_per_job:
    description: "Average travel time between service stops"
    calculation: null
    tables: []
    synonyms: ["drive time", "travel time", "time between stops", "windshield time"]
    confidence: unanswerable
    data_gap: "No GPS or travel data in Skimmer."
    blocked_on: "Telematics integration (GPS Trackit, Azuga, etc.)"
    partial_answer: "I can show service addresses per route to help estimate geographic density."

  on_time_arrival_rate:
    description: "Percent of appointments started within defined time windows"
    calculation: null
    tables: []
    synonyms: ["on-time rate", "punctuality", "arrival rate", "on time"]
    confidence: unanswerable
    data_gap: "No appointment time windows or actual arrival times in Skimmer."
    blocked_on: "Telematics or scheduling system with time windows"
    partial_answer: null

  route_density:
    description: "Stops per mile or per neighborhood — tighter density means better margins"
    calculation: null
    tables: []
    synonyms: ["stop density", "geographic density", "route tightness"]
    confidence: unanswerable
    data_gap: "Addresses exist but are not geocoded."
    blocked_on: "Geocoding service + telematics integration"
    partial_answer: "I can list service addresses grouped by city/zip to show geographic concentration."

  customer_satisfaction:
    description: "CSAT or NPS scores from post-visit surveys"
    calculation: null
    tables: []
    synonyms: ["CSAT", "NPS", "customer satisfaction", "satisfaction score", "customer rating"]
    confidence: unanswerable
    data_gap: "No survey or rating data in Skimmer."
    blocked_on: "Survey tool or CRM integration"
    partial_answer: null

  booking_rate:
    description: "Booked jobs divided by inbound calls or leads (CSR performance)"
    calculation: null
    tables: []
    synonyms: ["booking rate", "conversion rate", "call to booking", "lead conversion"]
    confidence: unanswerable
    data_gap: "No call center or lead tracking data."
    blocked_on: "Phone system (Xima, RingCentral) + CRM integration"
    partial_answer: "I can show new customer signups by month as a proxy for booking activity."

  customer_acquisition_cost:
    description: "Marketing spend divided by new customers acquired"
    calculation: null
    tables: []
    synonyms: ["CAC", "acquisition cost", "cost per customer", "cost to acquire"]
    confidence: unanswerable
    data_gap: "No marketing spend data."
    blocked_on: "QBO + CRM integration"
    partial_answer: "I can show new customer count by month. You'd need to divide by marketing spend manually."

lsi_calculation:
  formula: "pH + TempFactor + CalciumFactor + AlkalinityFactor - TDSFactor"
  status: "documented_only"
  reference: "https://www.orendatech.com/pool-dosing-calculator"
  note: "Requires pH, temperature, calcium hardness, total alkalinity, cyanuric acid, TDS readings"

