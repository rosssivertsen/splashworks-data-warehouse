# Pool Service Semantic Layer Consolidated YAML

business_terms:
  chlorine_usage:
    description: "Total amount of chlorine chemicals added to pools"
    sql_pattern: |
      WHERE EntryDescription.Description LIKE '%Chlorine%'
      AND ServiceStopEntry.EntryType = 'Dosage'
    tables_required: [ServiceStopEntry, EntryDescription, Pool]
    unit: "Measured in EntryDescription.UnitOfMeasure (oz, lbs, gallons)"
    synonyms: ["chlorine dosage", "chlorine added", "chlorine chemicals"]

tables:
  Customer:
    description: "Primary customer accounts who receive pool service"
    business_context: "One customer can have multiple service locations (home, rental properties)"
    key_columns:
      id:
        data_type: "TEXT (UUID)"
        description: "Unique customer identifier"
        is_primary_key: true
      IsActive:
        data_type: "BOOLEAN"
        description: "Whether customer is currently receiving service"
        sample_values: [true, false]
        business_rule: "Use for filtering active customer lists"

relationships:
  customer_to_chemical_usage:
    description: "Complete path from customer to chemical dosages"
    join_path:
      - "Customer"
      - "JOIN ServiceLocation ON Customer.id = ServiceLocation.CustomerId"
      - "JOIN Pool ON ServiceLocation.id = Pool.ServiceLocationId"
      - "JOIN ServiceStop ON Pool.id = ServiceStop.PoolId"
      - "JOIN ServiceStopEntry ON ServiceStop.id = ServiceStopEntry.ServiceStopId"
      - "JOIN EntryDescription ON ServiceStopEntry.EntryDescriptionId = EntryDescription.id"
    use_cases: ["Customer chemical usage analysis", "Service history by customer"]
  active_customers:
    description: "Customers currently receiving service"
    sql_pattern: |
      WHERE Customer.IsActive = 1 AND Customer.Deleted = 0
    tables_required: [Customer]
    synonyms: ["current customers", "paying customers"]

  filter_cleaning:
    description: "Scheduled filter cleaning and maintenance performed every 4 weeks"
    sql_pattern: |
      WHERE ServiceStopEntry.EntryType = 'Task'
      AND EntryDescription.Description LIKE '%Filter%'
      AND ServiceStopEntry.ServiceDate >= DATE('now', '-4 weeks')
    tables_required: [ServiceStopEntry, EntryDescription, ServiceStop]
    recurrence: "Every 4 weeks (monthly)"
    synonyms: ["filter service", "filter maintenance", "filter backwash"]

  salt_cell_cleaning:
    description: "Salt cell cleaning and inspection performed every 12 weeks"
    sql_pattern: |
      WHERE ServiceStopEntry.EntryType = 'Task'
      AND (EntryDescription.Description LIKE '%Salt Cell%' OR EntryDescription.Description LIKE '%Salt System%')
      AND ServiceStopEntry.ServiceDate >= DATE('now', '-12 weeks')
    tables_required: [ServiceStopEntry, EntryDescription, ServiceStop]
    recurrence: "Every 12 weeks (quarterly)"
    synonyms: ["salt system cleaning", "salt cell service"]

  lsi_test:
    description: "Langelier Saturation Index test performed monthly to assess water balance"
    sql_pattern: |
      WHERE ServiceStopEntry.EntryType = 'Reading'
      AND EntryDescription.Description = 'LSI'
      AND ServiceStopEntry.ServiceDate >= DATE('now', 'start of month')
    tables_required: [ServiceStopEntry, EntryDescription, Pool]
    recurrence: "Once a month"
    unit: "LSI value (optimal: -0.3 to +0.3)"
    calculation_note: "LSI = pH + Temperature Factor + Calcium Hardness Factor + Total Alkalinity Factor - TDS Factor"
    data_availability: "⚠️ PARTIAL - Requires pH, temp, calcium, alkalinity readings"

  # Add other entries similarly...

metrics:
  filter_maintenance_compliance:
    description: "Percentage of pools receiving filter cleaning on 4-week schedule"
    formula: "(Pools with filter cleaning in last 4 weeks / Total active pools) * 100"
    tables_required: [Pool, ServiceStopEntry, EntryDescription]
    unit: "Percentage (%)"
    target: "95%+ compliance"
    data_availability: "✅ AVAILABLE - If filter cleaning logged in ServiceStopEntry"

  lsi_compliance_rate:
    description: "Percentage of pools with LSI readings within acceptable range (-0.3 to +0.3)"
    formula: "(Pools with LSI between -0.3 and +0.3 / Total pools tested) * 100"
    tables_required: [Pool, ServiceStopEntry, EntryDescription]
    unit: "Percentage (%)"
    target: "80%+ in acceptable range"
    data_availability: "❌ NOT AVAILABLE - Requires LSI calculation implementation"

  # Add other metrics...

verified_queries:
  - question: "What is the average pool size (in gallons) across all active service locations?"
    sql_query: |
      SELECT 
        AVG(p.Gallons) AS AvgPoolGallons,
        MIN(p.Gallons) AS MinPoolGallons,
        MAX(p.Gallons) AS MaxPoolGallons,
        COUNT(p.id) AS TotalPools
      FROM Pool p
      JOIN ServiceLocation sl ON p.ServiceLocationId = sl.id
      JOIN Customer c ON sl.CustomerId = c.id
      WHERE c.IsInactive = 0
        AND p.Deleted = 0
        AND p.Gallons IS NOT NULL;
    expected_result_columns: ["AvgPoolGallons", "MinPoolGallons", "MaxPoolGallons", "TotalPools"]
    data_availability: "✅ AVAILABLE"
    business_logic:
      - "Only include active customers (IsInactive = 0)"
      - "Filter out soft-deleted pools"
      - "Exclude pools with NULL gallons"

  # Add other verified queries...

lsi_calculation:
  formula: "pH + TempFactor + CalciumFactor + AlkalinityFactor - TDSFactor"
  inputs:
    ph:
      source: "ServiceStopEntry WHERE EntryDescription.Description = 'pH'"
      unit: "pH units (7.0-8.0 typical)"
    temperature:
      source: "ServiceStopEntry WHERE EntryDescription.Description = 'Water Temperature'"
      unit: "Fahrenheit (°F)"
      factor_table:
        32: 0.0
        37: 0.1
        46: 0.2
        53: 0.3
        60: 0.4
        66: 0.5
        76: 0.6
        84: 0.7
        94: 0.8
        105: 0.9
    calcium_hardness:
      source: "ServiceStopEntry WHERE EntryDescription.Description = 'Calcium Hardness'"
      unit: "ppm (parts per million)"
      factor_table:
        25: 1.0
        50: 1.3
        75: 1.5
        100: 1.6
        150: 1.8
        200: 1.9
        250: 2.0
        300: 2.1
        400: 2.2
        800: 2.5
    total_alkalinity:
      source: "ServiceStopEntry WHERE EntryDescription.Description = 'Total Alkalinity'"
      unit: "ppm"
      adjustment: "Subtract Cyanuric Acid correction factor based on current pH"
      factor_table:
        25: 1.4
        50: 1.7
        75: 1.9
        100: 2.0
        150: 2.2
        200: 2.3
        300: 2.5
        400: 2.6
    cyanuric_acid:
      source: "ServiceStopEntry WHERE EntryDescription.Description = 'Cyanuric Acid'"
      unit: "ppm"
      purpose: "Correction factor for alkalinity based on pH"
    tds:
      source: "ServiceStopEntry WHERE EntryDescription.Description = 'Total Dissolved Solids'"
      unit: "ppm"
      factor: "12.2 (constant)"
  interpretation:
    lsi_negative: "Water is corrosive (under-saturated with calcium carbonate)"
    lsi_zero: "Water is balanced (ideal)"
    lsi_positive: "Water is scale-forming (over-saturated)"
    acceptable_range: "-0.3 to +0.3"
  implementation_reference: "https://www.orendatech.com/pool-dosing-calculator"
