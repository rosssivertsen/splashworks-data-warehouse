services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: splashworks-postgres
    command:
      - postgres
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_statement=ddl
      - -c
      - log_min_duration_statement=5000
      - -c
      - work_mem=16MB
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: splashworks
      POSTGRES_USER: splashworks
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splashworks -d splashworks"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '256mb'
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: splashworks-api
    environment:
      DATABASE_URL: postgresql://splashworks_ro:${DB_RO_PASSWORD}@postgres:5432/splashworks
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STATEMENT_TIMEOUT: "30s"
      ROW_LIMIT: "10000"
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: splashworks-frontend
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - api
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: splashworks-metabase
    environment:
      MB_DB_TYPE: h2
      JAVA_TIMEZONE: America/New_York
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ripple-api:
    build:
      context: .
      dockerfile: ripple/api/Dockerfile
    container_name: splashworks-ripple-api
    environment:
      DATABASE_URL: postgresql://ripple_rw:${DB_RIPPLE_PASSWORD}@postgres:5432/splashworks
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGINS: https://ripple.splshwrks.com
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ripple-frontend:
    build:
      context: .
      dockerfile: ripple/frontend/Dockerfile
    container_name: splashworks-ripple-frontend
    ports:
      - "127.0.0.1:3003:80"
    depends_on:
      - ripple-api
    restart: unless-stopped

volumes:
  pg_data:
