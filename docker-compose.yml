services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: splashworks-postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: splashworks
      POSTGRES_USER: splashworks
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splashworks -d splashworks"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '256mb'
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: splashworks-api
    environment:
      DATABASE_URL: postgresql://splashworks:${DB_PASSWORD}@postgres:5432/splashworks
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STATEMENT_TIMEOUT: "30s"
      ROW_LIMIT: "10000"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: splashworks-frontend
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - api
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: splashworks-metabase
    environment:
      MB_DB_TYPE: h2
      JAVA_TIMEZONE: America/New_York
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
